# Orkestrasi seluruh pipeline anomaly detection.
# Service ditambahkan bertahap mengikuti ROADMAP:
#   Minggu 3 -> iggy (+ producer)
#   Minggu 4 -> flink + ml scorer + paimon
#   Minggu 5 -> postgres (+ dashboard lokal)
#
# Jalankan broker saja: docker compose up -d iggy

name: realtime-anomaly-detection

services:
  # --- Minggu 3: Broker pesan (Apache Iggy) ---
  iggy:
    image: apache/iggy:0.8.0          # tag tetap (bukan :latest) demi reproducibility
    container_name: iggy
    environment:
      # Bind ke 0.0.0.0 supaya port bisa diakses dari luar container.
      IGGY_HTTP_ADDRESS: 0.0.0.0:3000
      IGGY_TCP_ADDRESS: 0.0.0.0:8090
      # Kredensial root awal (default Iggy: iggy/iggy). Ganti untuk produksi.
      IGGY_ROOT_USERNAME: ${IGGY_ROOT_USERNAME:-iggy}
      IGGY_ROOT_PASSWORD: ${IGGY_ROOT_PASSWORD:-iggy}
    ports:
      - "8090:8090"   # TCP (binary protocol)
      - "3000:3000"   # HTTP REST API <- dipakai producer Minggu 3
    volumes:
      - iggy_data:/local_data
    # Iggy memakai io_uring + thread affinity; tuning di bawah mencegah error izin.
    cap_add:
      - SYS_NICE
    security_opt:
      - seccomp:unconfined
    ulimits:
      memlock: -1
    healthcheck:
      # Image apache/iggy TIDAK menyertakan curl/wget, tapi ADA bash -> cek port HTTP (3000)
      # terbuka via /dev/tcp bash. Cukup sebagai sinyal readiness untuk depends_on.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/3000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Minggu 3: Producer (replay CSV -> Iggy) ---
  # Untuk Minggu 3 producer divalidasi dari host (venv). Service container ini
  # disiapkan untuk dipakai penuh di Minggu 4 (pipeline lewat docker compose up).
  # producer:
  #   build: ./producer
  #   container_name: producer
  #   depends_on:
  #     iggy:
  #       condition: service_healthy
  #   env_file: .env
  #   environment:
  #     IGGY_HOST: iggy            # nama service di jaringan compose
  #   volumes:
  #     - ./data:/data:ro

  # --- Minggu 4: Bridge Iggy(HTTP) -> TCP socket untuk Flink ---
  bridge:
    build: ./producer
    container_name: bridge
    # Override ENTRYPOINT producer.py -> jalankan bridge.py. Konek Iggy via nama service
    # (jaringan compose = IPv4, tak kena masalah localhost/IPv6); sajikan socket di 9999.
    entrypoint: ["python", "bridge.py"]
    command: ["--host", "iggy", "--port", "3000", "--bind-host", "0.0.0.0", "--socket-port", "9999"]
    environment:
      PYTHONUNBUFFERED: "1"          # agar print() bridge langsung tampil di docker logs
      IGGY_ROOT_USERNAME: ${IGGY_ROOT_USERNAME:-iggy}
      IGGY_ROOT_PASSWORD: ${IGGY_ROOT_PASSWORD:-iggy}
    depends_on:
      iggy:
        condition: service_healthy

  # --- Minggu 4: Flink (session cluster: JobManager + TaskManager) ---
  jobmanager:
    build: ./flink_job
    image: anomaly-flink:1.20.4      # tag agar TM pakai image yang sama tanpa build ulang
    container_name: jobmanager
    command: jobmanager
    ports:
      - "8081:8081"                  # Flink Web UI
    volumes:
      # Warehouse Paimon dibagi JM (committer) & TM (writer) -> harus volume yang SAMA.
      - paimon_data:/opt/paimon
    environment:
      # Memori dibatasi: mesin dev ~4 GB (VM Docker) harus memuat iggy+bridge+JM+TM sekaligus.
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1024m
    depends_on:
      bridge:
        condition: service_started

  taskmanager:
    image: anomaly-flink:1.20.4      # reuse image hasil build jobmanager
    container_name: taskmanager
    command: taskmanager
    volumes:
      - paimon_data:/opt/paimon       # warehouse Paimon bersama (lihat jobmanager)
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1280m
    depends_on:
      - jobmanager

  # --- Minggu 4: ML scorer service (HTTP, terpisah dari image PyFlink) ---
  # Dipisah agar versi dependency ML dipin PERSIS sama dengan environment training
  # (numpy/sklearn/pyod/river) -> unpickle ecod.pkl/hst.pkl tak gagal. Flink job (4d)
  # memanggil POST /score per-event lewat nama service `scorer` di jaringan compose.
  scorer:
    build: ./ml
    container_name: scorer
    environment:
      PYTHONUNBUFFERED: "1"          # log scorer langsung tampil di docker logs
    volumes:
      # Model besar (~275 MB) TIDAK ikut image; di-mount read-only saat runtime.
      - ./ml/models:/app/models:ro
    healthcheck:
      # Image python:3.11-slim tak punya curl -> pakai urllib stdlib. start_period
      # longgar (120s) karena load ecod.pkl ~234 MB bisa makan puluhan detik.
      test: ["CMD-SHELL", "python -c \"import urllib.request as u,sys; sys.exit(0 if u.urlopen('http://127.0.0.1:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # --- Minggu 5: Postgres (sink dashboard) ---

volumes:
  iggy_data:
  paimon_data:
