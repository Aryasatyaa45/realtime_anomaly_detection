# Orkestrasi seluruh pipeline anomaly detection.
# Service ditambahkan bertahap mengikuti ROADMAP:
#   Minggu 3 -> iggy (+ producer)
#   Minggu 4 -> flink + ml scorer + paimon
#   Minggu 5 -> postgres (+ dashboard lokal)
#
# Jalankan broker saja: docker compose up -d iggy

name: realtime-anomaly-detection

services:
  # --- Minggu 3: Broker pesan (Apache Iggy) ---
  iggy:
    image: apache/iggy:0.8.0          # tag tetap (bukan :latest) demi reproducibility
    container_name: iggy
    environment:
      # Bind ke 0.0.0.0 supaya port bisa diakses dari luar container.
      IGGY_HTTP_ADDRESS: 0.0.0.0:3000
      IGGY_TCP_ADDRESS: 0.0.0.0:8090
      # Kredensial root awal (default Iggy: iggy/iggy). Ganti untuk produksi.
      IGGY_ROOT_USERNAME: ${IGGY_ROOT_USERNAME:-iggy}
      IGGY_ROOT_PASSWORD: ${IGGY_ROOT_PASSWORD:-iggy}
    ports:
      - "8090:8090"   # TCP (binary protocol)
      - "3000:3000"   # HTTP REST API <- dipakai producer Minggu 3
    volumes:
      - iggy_data:/local_data
    # Iggy memakai io_uring + thread affinity; tuning di bawah mencegah error izin.
    cap_add:
      - SYS_NICE
    security_opt:
      - seccomp:unconfined
    ulimits:
      memlock: -1
    healthcheck:
      # Image apache/iggy TIDAK menyertakan curl/wget, tapi ADA bash -> cek port HTTP (3000)
      # terbuka via /dev/tcp bash. Cukup sebagai sinyal readiness untuk depends_on.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/3000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Minggu 3/4: Producer (replay CSV -> Iggy) ---
  # Seed data sekali jalan saat `docker compose up`, lalu exit (restart: no).
  # Bridge mem-poll Iggy dari offset 0, jadi urutan producer vs job tidak kritis.
  producer:
    build: ./producer
    container_name: producer
    depends_on:
      iggy:
        condition: service_healthy
    environment:
      IGGY_HOST: iggy             # nama service di jaringan compose
      IGGY_ROOT_USERNAME: ${IGGY_ROOT_USERNAME:-iggy}
      IGGY_ROOT_PASSWORD: ${IGGY_ROOT_PASSWORD:-iggy}
      DATA_PATH: /data/creditcard.csv
    # Jumlah transaksi yang di-seed. 50k (default) cukup memuat fraud dengan skor ekstrem +
    # membuat Half-Space Trees (online) matang -> anomali nyata tembus ambang di dashboard.
    # Ubah lewat env PRODUCER_LIMIT (mis. 0/kosongkan flag utk full ~285k, tapi lama).
    command: ["--limit", "${PRODUCER_LIMIT:-50000}"]
    volumes:
      - ./data:/data:ro
    restart: "no"

  # --- Minggu 4: Bridge Iggy(HTTP) -> TCP socket untuk Flink ---
  bridge:
    build: ./producer
    container_name: bridge
    # Override ENTRYPOINT producer.py -> jalankan bridge.py. Konek Iggy via nama service
    # (jaringan compose = IPv4, tak kena masalah localhost/IPv6); sajikan socket di 9999.
    entrypoint: ["python", "bridge.py"]
    command: ["--host", "iggy", "--port", "3000", "--bind-host", "0.0.0.0", "--socket-port", "9999"]
    environment:
      PYTHONUNBUFFERED: "1"          # agar print() bridge langsung tampil di docker logs
      IGGY_ROOT_USERNAME: ${IGGY_ROOT_USERNAME:-iggy}
      IGGY_ROOT_PASSWORD: ${IGGY_ROOT_PASSWORD:-iggy}
    depends_on:
      iggy:
        condition: service_healthy

  # --- Minggu 4: Flink (session cluster: JobManager + TaskManager) ---
  jobmanager:
    build: ./flink_job
    image: anomaly-flink:1.20.4      # tag agar TM pakai image yang sama tanpa build ulang
    container_name: jobmanager
    command: jobmanager
    ports:
      - "8081:8081"                  # Flink Web UI
    volumes:
      # Warehouse Paimon dibagi JM (committer) & TM (writer) -> harus volume yang SAMA.
      - paimon_data:/opt/paimon
    environment:
      # Memori dibatasi: mesin dev ~4 GB (VM Docker) harus memuat iggy+bridge+JM+TM sekaligus.
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1024m
    depends_on:
      bridge:
        condition: service_started

  taskmanager:
    image: anomaly-flink:1.20.4      # reuse image hasil build jobmanager
    container_name: taskmanager
    command: taskmanager
    volumes:
      - paimon_data:/opt/paimon       # warehouse Paimon bersama (lihat jobmanager)
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1280m
    depends_on:
      - jobmanager

  # --- Minggu 4: ML scorer service (HTTP, terpisah dari image PyFlink) ---
  # Dipisah agar versi dependency ML dipin PERSIS sama dengan environment training
  # (numpy/sklearn/pyod/river) -> unpickle ecod.pkl/hst.pkl tak gagal. Flink job (4d)
  # memanggil POST /score per-event lewat nama service `scorer` di jaringan compose.
  scorer:
    build: ./ml
    container_name: scorer
    environment:
      PYTHONUNBUFFERED: "1"          # log scorer langsung tampil di docker logs
    volumes:
      # Model besar (~275 MB) TIDAK ikut image; di-mount read-only saat runtime.
      - ./ml/models:/app/models:ro
    healthcheck:
      # Image python:3.11-slim tak punya curl -> pakai urllib stdlib. start_period
      # longgar (120s) karena load ecod.pkl ~234 MB bisa makan puluhan detik.
      test: ["CMD-SHELL", "python -c \"import urllib.request as u,sys; sys.exit(0 if u.urlopen('http://127.0.0.1:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # --- Minggu 4f: Job-submitter (auto `flink run` saat cluster siap, lalu exit) ---
  # Pakai image Flink yang sama (punya pyflink venv + job.py 4e ter-baked). Menunggu
  # JobManager REST melaporkan >=1 TaskManager teregistrasi, baru submit job detached.
  # Memisahkan submit ke service sendiri = `docker compose up` jalan tanpa langkah manual.
  job-submitter:
    image: anomaly-flink:1.20.4
    container_name: job-submitter
    # WAJIB jalan sebagai user `flink` (uid 9999), BUKAN root. Override entrypoint ke bash
    # mem-bypass `gosu flink` bawaan image -> tanpa baris ini container jadi root, lalu DDL
    # `CREATE TABLE` (client-side) membuat folder katalog default.db/scores/schema milik root.
    # Writer di TaskManager (jalan sbg flink) lalu gagal mkdir bucket-0 di dalamnya:
    # "Mkdirs failed to create .../bucket-0". Samakan user -> semua warehouse milik flink.
    user: flink
    # Kredensial Postgres dibaca job.py (sisi client) saat membangun DDL sink JDBC `pg_scores`.
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-anomaly}
      POSTGRES_USER: ${POSTGRES_USER:-anomaly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anomaly}
    volumes:
      # WAJIB: DDL `CREATE TABLE` Paimon dieksekusi di sisi CLIENT (di sinilah `flink run`
      # berjalan). Tanpa mount warehouse bersama, schema tertulis ke /opt/paimon ephemeral
      # milik container ini -> committer (JM) & writer (TM) baca volume bersama yang kosong
      # schema -> "Cannot get latest schema for table scores" -> job RESTARTING. Mount sama.
      - paimon_data:/opt/paimon
    depends_on:
      jobmanager:
        condition: service_started
      taskmanager:
        condition: service_started
      bridge:
        condition: service_started
      scorer:
        condition: service_healthy
      # Tabel `scores` (db/init.sql) harus sudah ada sebelum sink JDBC init. `pg_isready`
      # healthy = entrypoint Postgres selesai jalankan init script (init dijalankan SEBELUM
      # Postgres buka koneksi eksternal).
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "[submitter] menunggu cluster Flink siap (jobmanager + >=1 taskmanager)..."
        until python -c "import urllib.request,json,sys; d=json.load(urllib.request.urlopen('http://jobmanager:8081/overview')); sys.exit(0 if d.get('taskmanagers',0)>=1 else 1)" 2>/dev/null; do sleep 2; done
        echo "[submitter] cluster siap, submit job 4e (skor -> Paimon)..."
        flink run -m jobmanager:8081 -d -py /opt/flink_job/job.py
        echo "[submitter] job tersubmit, selesai."
    restart: "no"

  # --- Minggu 5: Postgres (serving layer untuk dashboard) ---
  # Sink kedua pipeline (di samping Paimon). DB, user, & tabel `scores` dibuat OTOMATIS:
  # DB/user dari env di bawah; tabel dari db/init.sql yang di-mount ke initdb.d (jalan sekali
  # saat volume pertama dibuat). Tak ada langkah manual -> DoD Level 2 terjaga.
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anomaly}
      POSTGRES_USER: ${POSTGRES_USER:-anomaly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anomaly}
    ports:
      - "5432:5432"   # diexpose agar bisa diinspeksi psql dari host (opsional)
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anomaly} -d ${POSTGRES_DB:-anomaly}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Minggu 5: Dashboard Streamlit (baca Postgres) ---
  # Lokal baca service `postgres`; saat deploy Streamlit Cloud (Minggu 6) override
  # DASHBOARD_DB_URL ke Supabase -> code path sama.
  dashboard:
    build: ./dashboard
    container_name: dashboard
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-anomaly}
      POSTGRES_USER: ${POSTGRES_USER:-anomaly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anomaly}
      DASHBOARD_DB_URL: ${DASHBOARD_DB_URL:-}   # kosong = bangun dari POSTGRES_* di atas
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  iggy_data:
  paimon_data:
  pg_data:
